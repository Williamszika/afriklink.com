<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="./fonts.css">
<style>
*{margin:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#14502E,#0C3A20);color:#FAF4E6;position:relative}
.wax{position:absolute;inset:0;opacity:.5;background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2264%22%20height%3D%2278%22%20viewBox%3D%220%200%2064%2078%22%3E%3Cg%20fill%3D%22none%22%20stroke%3D%22%23C7922E%22%20stroke-width%3D%221.3%22%20stroke-opacity%3D%220.30%22%3E%3Cpath%20d%3D%22M32%2010%20C39%2010%2044%2019%2044%2031%20C44%2043%2039%2050%2032%2050%20C25%2050%2020%2043%2020%2031%20C20%2019%2025%2010%2032%2010%20Z%22%2F%3E%3Cpath%20d%3D%22M32%2017%20C34%2025%2034%2035%2032%2045%20C30%2035%2030%2025%2032%2017%20Z%22%2F%3E%3Cpath%20d%3D%22M28%2023h-4M28%2028h-4.5M28%2033h-4.6M28%2038h-4%22%20stroke-width%3D%220.95%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E");background-size:64px}
.bar{position:absolute;top:0;left:0;right:0;height:8px;background:#C7922E}
.in{position:relative;padding:72px 80px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.brand{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:34px;letter-spacing:-.02em;display:flex;align-items:center;gap:14px}
.brand .dot{width:16px;height:16px;border-radius:50%;background:#C7922E;box-shadow:0 0 0 5px rgba(199,146,46,.25)}
.brand b span{color:#C7922E}
.eyebrow{font-family:'Space Mono',monospace;font-size:18px;letter-spacing:.2em;text-transform:uppercase;color:#F0D89A;margin-bottom:20px}
h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:62px;line-height:1.05;letter-spacing:-.02em;max-width:18ch}
.sub{margin-top:22px;font-size:24px;color:#DCEAE0}
.foot{display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:18px;color:#A9BDA8}
.foot b{color:#FAF4E6}
</style></head><body>
<div class="wax"></div><div class="bar"></div>
<div class="in">
  <div class="brand"><span class="dot"></span><b>Afrik<span>link</span></b></div>
  <div>
    <div class="eyebrow">◆ Afrique de l'Ouest ↔ Europe</div>
    <h1>Une place de marché qui relie l'Afrique et l'Europe.</h1>
    <div class="sub">Boutiques · Restaurants · Salons · Services</div>
  </div>
  <div class="foot"><span><b>afriklink.com</b> — la marketplace africaine</span><span>Paiements sécurisés · Vendeurs vérifiés</span></div>
</div>
</body></html>
